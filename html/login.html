<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login | Tau Sports</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="header-login">
    
        <!-- LOGO -->
        <a class="logo" href="index.html" aria-label="Página inicial Taú Sports">
            <img src="../imagensUCE/logoTauSportsRecortada.png" alt="Logo Taú Sports">
        </a>

    </header>

    <!-- MAIN -->
    <main class="login-page">

        <section class="login-container">

            <!-- LADO ESQUERDO -->
            <div class="login-banner">

                <div class="overlay"></div>

                

            </div>

            <!-- LADO DIREITO -->
            <div class="login-box">

                <div class="login-header">

                    <h1>
                        Bem-vindo de volta
                    </h1>

                    <p>
                        Faça login para continuar
                    </p>

                </div>

                <!-- FORM -->
                <form class="login-form">

                    <div class="input-group">

                        <label for="email">
                            E-mail
                        </label>

                        <input
                            type="email"
                            id="email"
                            class="input"
                            placeholder="Digite seu e-mail"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <label for="senha">
                            Senha
                        </label>

                        <input
                            type="password"
                            id="senha"
                            class="input"
                            placeholder="Digite sua senha"
                            required
                        >

                    </div>

                    <!-- OPÇÕES -->
                    <div class="login-options">

                        <a href="#" class="esqueceuASenha">
                            Esqueceu a senha?
                        </a>

                    </div>

                    <!-- BOTÃO -->
                    <button 
                        type="submit"
                        class="btn btn-primary login-btn"
                    >
                        Entrar
                    </button>

                </form>

                <!-- DIVISOR -->
                <div class="divider">
                    <span>ou</span>
                </div>

                <!-- LOGIN SOCIAL -->
                <div class="social-login">

                    <button class="social-btn">

                        <img 
                            src="../imagensUCE/google.png" 
                            alt="Google"
                        >

                        <span>
                            Continuar com Google
                        </span>

                    </button>

                    <button class="social-btn facebook">

                        <img 
                            src="../imagensUCE/facebookBranco.svg" 
                            alt="Facebook"
                        >

                        <span>
                            Continuar com Facebook
                        </span>

                    </button>

                </div>

                <!-- FOOTER -->
                <div class="login-footer">

                    <p>
                        Ainda não possui conta?
                        <a href="#">
                        Criar conta Tau Sports
                    </a>
                    </p>

                    

                </div>

            </div>

        </section>

    </main>

</body>
</html>
